<!-- STRUTTURA HTML MINIMALISTA -->
<div class="minimal-header-wrapper">
  <div class="minimal-terminal">
    <div class="terminal-line">
      <span id="prompt" class="prompt-user">simone@localhost:~$ </span>
      <span id="command" class="command"></span><span class="cursor">&nbsp;</span>
    </div>
    <div id="output" class="output"></div>
  </div>
</div>

<!-- STILI CSS -->
<style>
  /* --- VARIABILI COLORI: TEMA SCURO (Default) --- */
  :root {
    --term-user: #50fa7b;     /* Verde fluo */
    --term-root: #ff5555;     /* Rosso acceso */
    --term-cmd: #e0e0e0;      /* Grigio chiarissimo */
    --term-out: #999999;      /* Grigio medio */
    --term-cursor: #50fa7b;   /* Verde fluo */
    --term-subtitle: #888888; /* Grigio scuro */
  }

  /* --- VARIABILI COLORI: TEMA CHIARO (Attivato dal bottone di Chirpy) --- */
  html[data-mode="light"] {
    --term-user: #0fa93c;     /* Verde più scuro per essere leggibile sul bianco */
    --term-root: #d32f2f;     /* Rosso scuro/mattone */
    --term-cmd: #24292e;      /* Nero (stile GitHub) per il testo del comando */
    --term-out: #6a737d;      /* Grigio spento per l'output */
    --term-cursor: #0fa93c;   /* Verde più scuro */
    --term-subtitle: #586069; /* Grigio leggibile */
  }

  /* Fallback nel caso in cui il tema chiaro sia quello di sistema ma il bottone non sia stato premuto */
  @media (prefers-color-scheme: light) {
    html:not([data-mode="dark"]) {
      --term-user: #0fa93c;
      --term-root: #d32f2f;
      --term-cmd: #24292e;
      --term-out: #6a737d;
      --term-cursor: #0fa93c;
      --term-subtitle: #586069;
    }
  }

  /* Contenitore principale */
  .minimal-header-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 3rem 0 3rem 0; 
  }

  /* Il blocco terminale: larghezza fissa per evitare salti */
  .minimal-terminal {
    text-align: left; 
    font-family: 'Fira Code', 'Courier New', monospace; 
    min-height: 120px; 
    margin-bottom: 15px; 
    width: 640px; 
    max-width: 90vw; 
  }

  /* Riga del comando */
  .terminal-line {
    font-size: 1.3rem;
    margin-bottom: 8px;
  }

  /* I colori ora richiamano le variabili dinamiche definite in alto */
  .prompt-user { color: var(--term-user); font-weight: bold; transition: color 0.3s ease; }
  .prompt-root { color: var(--term-root); font-weight: bold; transition: color 0.3s ease; }
  .command { color: var(--term-cmd); transition: color 0.3s ease; }

  /* Output testuale */
  .output {
    color: var(--term-out);
    font-size: 0.95rem; 
    line-height: 1.5;
    white-space: pre-wrap;
    padding-left: 2px;
    transition: color 0.3s ease;
  }

  /* Cursore verde dinamico */
  .cursor {
    display: inline-block;
    width: 12px;
    height: 1.1em;
    background-color: var(--term-cursor);
    vertical-align: text-bottom;
    position: relative;
    top: -2px; 
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    transition: background-color 0.3s ease;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Sottotitolo descrittivo */
  .terminal-subtitle {
    text-align: center;
    color: var(--term-subtitle);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 1rem;
    max-width: 600px;
    line-height: 1.6;
    transition: color 0.3s ease;
  }
</style>

<!-- LOGICA JAVASCRIPT -->
<script>
  (function() {
    const terminalScript = [
      { prompt: "simone@localhost:~$ ", isRoot: false, cmd: "whoami", out: "simone", delayAfter: 4000, backspace: true },
      { prompt: "simone@localhost:~$ ", isRoot: false, cmd: "sudo -l", out: "User simone may run the following commands on localhost:\n    (root) NOPASSWD: /usr/bin/python3", delayAfter: 5000, backspace: true },
      { prompt: "simone@localhost:~$ ", isRoot: false, cmd: "sudo python3 -c 'import os; os.system(\"/bin/bash\")'", out: "", delayAfter: 400, backspace: false },
      { prompt: "root@localhost:~# ", isRoot: true, cmd: "whoami", out: "root", delayAfter: 3000, backspace: true },
      { prompt: "root@localhost:~# ", isRoot: true, cmd: "cat /root/flag.txt", out: "HTB{w3lc0m3_t0_my_p0rtf0l10}", delayAfter: 6000, backspace: true }
    ];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    async function typeWriter(element, text, targetPrompt) {
      element.textContent = "";
      if (!text) return;
      for (let i = 0; i < text.length; i++) {
        if (!document.body.contains(targetPrompt)) return;
        element.textContent += text.charAt(i);
        await sleep(Math.random() * 50 + 50);
      }
    }
    async function backspaceWriter(element, targetPrompt) {
      let text = element.textContent;
      while (text.length > 0) {
        if (!document.body.contains(targetPrompt)) return;
        text = text.slice(0, -1);
        element.textContent = text;
        await sleep(30);
      }
    }
    async function startAnimation() {
      const promptEl = document.getElementById('prompt');
      const cmdEl = document.getElementById('command');
      const outEl = document.getElementById('output');
      if (!promptEl || !cmdEl || !outEl || promptEl.dataset.running === "true") return;
      promptEl.dataset.running = "true";
      let i = 0;
      while (document.body.contains(promptEl)) {
        const step = terminalScript[i];
        outEl.textContent = "";
        cmdEl.textContent = ""; 
        promptEl.textContent = step.prompt;
        promptEl.className = step.isRoot ? "prompt-root" : "prompt-user";
        await sleep(800);
        if (!document.body.contains(promptEl)) break;
        await typeWriter(cmdEl, step.cmd, promptEl);
        if (!document.body.contains(promptEl)) break;
        await sleep(400);
        if (!document.body.contains(promptEl)) break;
        if (step.out !== "") {
          outEl.innerHTML = step.out.replace(/\n/g, '<br>');
        }
        await sleep(step.delayAfter);
        if (!document.body.contains(promptEl)) break;
        if (step.backspace) {
          outEl.textContent = "";
          await sleep(200);
          await backspaceWriter(cmdEl, promptEl);
        }
        i = (i + 1) % terminalScript.length;
      }
    }
    startAnimation();
    document.addEventListener("pjax:success", startAnimation);
    document.addEventListener("DOMContentLoaded", startAnimation);
  })();
</script>
