<!-- STRUTTURA HTML MINIMALISTA -->
<div class="minimal-header-wrapper">
  <div class="minimal-terminal">
    <div class="terminal-line">
      <span id="prompt" class="prompt-user">simone@localhost:~$ </span>
      <span id="command" class="command"></span><span class="cursor">&nbsp;</span>
    </div>
    <div id="output" class="output"></div>
  </div>
</div>

<!-- STILI CSS -->
<style>
  /* --- VARIABILI COLORI: TEMA SCURO (Default) --- */
  :root {
    --term-user: #50fa7b;     /* Verde fluo */
    --term-root: #ff5555;     /* Rosso acceso */
    --term-cmd: #e0e0e0;      /* Grigio chiarissimo */
    --term-out: #999999;      /* Grigio medio */
    --term-cursor: #50fa7b;   /* Verde fluo */
    --term-subtitle: #888888; /* Grigio scuro */
  }

  /* --- VARIABILI COLORI: TEMA CHIARO (Attivato dal bottone di Chirpy) --- */
  html[data-mode="light"] {
    --term-user: #0fa93c;     /* Verde più scuro per essere leggibile sul bianco */
    --term-root: #d32f2f;     /* Rosso scuro/mattone */
    --term-cmd: #24292e;      /* Nero (stile GitHub) per il testo del comando */
    --term-out: #6a737d;      /* Grigio spento per l'output */
    --term-cursor: #0fa93c;   /* Verde più scuro */
    --term-subtitle: #586069; /* Grigio leggibile */
  }

  /* Fallback nel caso in cui il tema chiaro sia quello di sistema ma il bottone non sia stato premuto */
  @media (prefers-color-scheme: light) {
    html:not([data-mode="dark"]) {
      --term-user: #0fa93c;
      --term-root: #d32f2f;
      --term-cmd: #24292e;
      --term-out: #6a737d;
      --term-cursor: #0fa93c;
      --term-subtitle: #586069;
    }
  }

  /* Contenitore principale */
  .minimal-header-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 3rem 0 3rem 0; 
  }

  /* Il blocco terminale: larghezza fissa per evitare salti */
  .minimal-terminal {
    text-align: left; 
    font-family: 'Fira Code', 'Courier New', monospace; 
    min-height: 120px; 
    margin-bottom: 15px; 
    width: 640px; 
    max-width: 90vw; 
  }

  /* Riga del comando */
  .terminal-line {
    font-size: 1.3rem;
    margin-bottom: 8px;
  }

  /* I colori ora richiamano le variabili dinamiche definite in alto */
  .prompt-user { color: var(--term-user); font-weight: bold; transition: color 0.3s ease; }
  .prompt-root { color: var(--term-root); font-weight: bold; transition: color 0.3s ease; }
  .command { color: var(--term-cmd); transition: color 0.3s ease; }

  /* Output testuale */
  .output {
    color: var(--term-out);
    font-size: 0.95rem; 
    line-height: 1.5;
    white-space: pre-wrap;
    padding-left: 2px;
    transition: color 0.3s ease;
  }

  /* Cursore verde dinamico */
  .cursor {
    display: inline-block;
    width: 12px;
    height: 1.1em;
    background-color: var(--term-cursor);
    vertical-align: text-bottom;
    position: relative;
    top: -2px; 
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    transition: background-color 0.3s ease;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Sottotitolo descrittivo */
  .terminal-subtitle {
    text-align: center;
    color: var(--term-subtitle);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 1rem;
    max-width: 600px;
    line-height: 1.6;
    transition: color 0.3s ease;
  }
</style>

<!-- LOGICA JAVASCRIPT -->
<script>
  // La sequenza con le nuove regole per ogni comando
  const terminalScript = [
    { 
      prompt: "simone@localhost:~$ ", 
      isRoot: false, 
      cmd: "whoami", 
      out: "simone",
      delayAfter: 2000,  // Secondi di attesa prima di cancellare
      backspace: true    // Attiva la cancellazione lettera per lettera
    },
    { 
      prompt: "simone@localhost:~$ ", 
      isRoot: false, 
      cmd: "sudo -l", 
      out: "User simone may run the following commands on localhost:\n    (root) NOPASSWD: /usr/bin/python3",
      delayAfter: 4000,
      backspace: true
    },
    { 
      prompt: "simone@localhost:~$ ", 
      isRoot: false, 
      cmd: "sudo python3 -c 'import os; os.system(\"/bin/bash\")'", 
      out: "", 
      delayAfter: 400,   // Attesa quasi nulla
      backspace: false   // NESSUNA cancellazione: passa diretto alla shell
    },
    { 
      prompt: "root@localhost:~# ", 
      isRoot: true, 
      cmd: "whoami", 
      out: "root",
      delayAfter: 2000,
      backspace: true
    },
    { 
      prompt: "root@localhost:~# ", 
      isRoot: true, 
      cmd: "cat /root/flag.txt", 
      out: "HTB{w3lc0m3_t0_my_p0rtf0l10}",
      delayAfter: 6000,
      backspace: true
    }
  ];

  // Funzione di pausa
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  // Simula la scrittura in avanti
  async function typeWriter(element, text) {
    element.textContent = "";
    for (let i = 0; i < text.length; i++) {
      element.textContent += text.charAt(i);
      await sleep(Math.random() * 50 + 50); // Velocità casuale per realismo
    }
  }

  // Simula la pressione del tasto Backspace (cancellazione all'indietro)
  async function backspaceWriter(element) {
    let text = element.textContent;
    while (text.length > 0) {
      text = text.slice(0, -1);
      element.textContent = text;
      await sleep(30); // Cancellazione veloce, come se si tenesse premuto il tasto
    }
  }

  // Motore principale dell'animazione
  async function runTerminal() {
    const promptEl = document.getElementById('prompt');
    const cmdEl = document.getElementById('command');
    const outEl = document.getElementById('output');

    let i = 0;

    while (true) {
      const step = terminalScript[i];
      
      // 1. Setup iniziale del prompt
      outEl.textContent = "";
      cmdEl.textContent = ""; 
      promptEl.textContent = step.prompt;
      promptEl.className = step.isRoot ? "prompt-root" : "prompt-user";

      // 2. Pausa prima di scrivere
      await sleep(800);

      // 3. Scrive il comando
      await typeWriter(cmdEl, step.cmd);

      // 4. Pausa per simulare l'Invio
      await sleep(400);

      // 5. Stampa l'output (se presente)
      if (step.out !== "") {
        outEl.innerHTML = step.out.replace(/\n/g, '<br>');
      }

      // 6. Attesa personalizzata post-comando
      await sleep(step.delayAfter);

      // 7. Fase di pulizia (se backspace è true)
      if (step.backspace) {
        outEl.textContent = ""; // Fa scomparire prima l'output
        await sleep(200);       // Brevissima pausa
        await backspaceWriter(cmdEl); // Cancella il comando lettera per lettera
      }

      // Passa al comando successivo
      i = (i + 1) % terminalScript.length;
    }
  }

  // Avvio al caricamento
  document.addEventListener("DOMContentLoaded", () => {
    runTerminal();
  });
</script>
